name: Update Database

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: Linux-cargo
      - name: Build
        run: cargo build --release
      - uses: oven-sh/setup-bun@v2
      - name: Clean old data
        run: rm -f scratch_projects.jsonl users.jsonl projects.db
      - name: Fetch
        run: ./target/release/scratch-mega-fetcher
      - name: Import
        run: timeout 120 bun run server.ts || true
      - name: Deploy
        run: |
          sqlite3 projects.db "PRAGMA wal_checkpoint(TRUNCATE); VACUUM;"
          mkdir -p docs
          cp index.html docs/index.html
          cp projects.db docs/projects.db
      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || (git commit -m "auto update" && git pull --rebase && git push)
